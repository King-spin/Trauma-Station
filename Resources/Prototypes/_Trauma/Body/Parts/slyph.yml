- type: entity
  id: Partsylph
  parent: [BaseItem, BasePart]
  name: "sylph body part"
  abstract: true
  components:
  - type: Icon # Shitmed Change
    sprite: Mobs/Species/sylph/parts.rsi
  - type: BodyPart # Shitmed Change
    species: sylph
  - type: Extractable
    juiceSolution:
      reagents:
      - ReagentId: Fat
        Quantity: 3
      - ReagentId: Blood
        Quantity: 10
  - type: Damageable # Shitmed
    damageModifierSet: Scale

- type: entity
  id: torsosylph
  name: "sylph torso"
  parent: [Partsylph, Basetorso]
  components:
  - type: Sprite
    sprite: Mobs/Species/sylph/parts.rsi
    state: "torso"
  - type: Extractable
    juiceSolution:
      reagents:
      - ReagentId: Fat
        Quantity: 20
      - ReagentId: Blood
        Quantity: 40

